services:
  abacus-backup-manager:
    build: .
    container_name: abacus-backup-manager
    ports:
      - "8080:8080"
    environment:
      ABACUS_API_KEY: ${ABACUS_API_KEY:-}
      ABACUS_DEPLOYMENT_IDS: ${ABACUS_DEPLOYMENT_IDS:-}
      ABACUS_EXTERNAL_APPLICATION_IDS: ${ABACUS_EXTERNAL_APPLICATION_IDS:-}
      ABACUS_CONVERSATION_TYPES: ${ABACUS_CONVERSATION_TYPES:-}
      APP_DATA_DIR: /data
      APP_ALLOW_UI_API_KEY: ${APP_ALLOW_UI_API_KEY:-true}
      APP_ALLOW_PERSISTENT_API_KEY: ${APP_ALLOW_PERSISTENT_API_KEY:-true}
      APP_BASIC_AUTH_USER: ${APP_BASIC_AUTH_USER:-}
      APP_BASIC_AUTH_PASSWORD: ${APP_BASIC_AUTH_PASSWORD:-}
    volumes:
      - abacus_backup_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    labels:
      homelab.enable: "true"
      homelab.name: "Abacus Chat Backup"
      homelab.slug: "app-abacus-chat-backup"
      homelab.port: "8080"
      homelab.group: "Tools"
      homelab.description: "Backup & export manager for Abacus.AI chat conversations"
      homelab.icon: "mdi:chat-outline"
      homelab.health: "/api/health"
      homelab.version: "${APP_VERSION:-dev}"
      homelab.tags: "backup,abacus,fastapi,export"
      homelab.order: "50"
      homelab.hidden: "false"

volumes:
  abacus_backup_data:
